{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-header bg-secondary text-white">
        <h5 class="mb-0"><i class="fas fa-history me-2"></i> Classification History</h5>
    </div>
    <div class="card-body">
        <input type="text" id="search" class="form-control mb-3" placeholder="Search messages or labels..." onkeyup="filterTable()">
        <table id="logTable" class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Message</th>
                    <th>Label</th>
                    <th>Confidence</th>
                </tr>
            </thead>
            <tbody>
                {% for entry in log_entries %}
                <tr>
                    <td>{{ entry[0] }}</td>
                    <td>{{ entry[1] }}</td>
                    <td class="{{ 'scam' if entry[2]=='scam' else 'legitimate' }}">{{ entry[2].upper() }}</td>
                    <td class="{{ 'low-conf' if entry[3] < '70.0' }}">{{ entry[3] }}%</td>
                </tr>
                {% else %}
                <tr><td colspan="4" class="text-center">No log entries yet.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<script>
    function filterTable() {
        const input = document.getElementById('search').value.toLowerCase();
        const table = document.getElementById('logTable');
        const tr = table.getElementsByTagName('tr');
        for (let i = 1; i < tr.length; i++) {
            const td = tr[i].getElementsByTagName('td')[1]; // message column
            if (td) {
                tr[i].style.display = td.textContent.toLowerCase().includes(input) ? '' : 'none';
            }
        }
    }
</script>
{% endblock %}
