{% extends "base.html" %}
{% block content %}
<div class="container my-4">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">
                <i class="fas fa-shield-alt me-2"></i> AI Scam Detector
            </h5>
            <p class="small text-muted mt-2 mb-0">
                Powered by TF-IDF + PyTorch • Detects UPI fraud, digital arrest, lottery scams, government scheme frauds, etc.
            </p>
        </div>
        <div class="card-body bg-dark-subtle text-white">
            <div class="mb-4">
                <label for="messages" class="form-label fw-semibold">Messages to Analyze</label>
                <textarea id="messages" class="form-control bg-dark text-white border-secondary" rows="6"
                          placeholder="Paste one message per line for batch processing..." oninput="updatePreview()"></textarea>
            </div>

            <div id="preview" class="small text-secondary mb-4">
                Preview: 0 messages entered
            </div>

            <div class="d-flex flex-wrap gap-2 mb-4">
                <button class="btn btn-primary" onclick="classify()">
                    <i class="fas fa-play me-1"></i> Classify Now
                </button>
                <button class="btn btn-outline-secondary" onclick="clearInput()">
                    <i class="fas fa-eraser me-1"></i> Clear
                </button>
            </div>

            <div id="results" class="mt-4"></div>
            <div id="save-note" class="mt-3 small text-secondary"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    async function classify() {
        const btn = document.querySelector('button[onclick="classify()"]');
        const resultsDiv = document.getElementById('results');
        const noteDiv = document.getElementById('save-note');

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Analyzing...';
        resultsDiv.innerHTML = '<div class="text-center my-5"><div class="spinner-border text-primary" role="status"></div><p class="mt-3">Scanning messages...</p></div>';
        noteDiv.innerHTML = '';

        try {
            const input = document.getElementById('messages').value.trim();
            const messages = input.split('\n').map(m => m.trim()).filter(m => m);
            if (messages.length === 0) throw new Error('Please enter at least one message');

            const response = await fetch('/classify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages })
            });

            if (!response.ok) throw new Error(`Server error: ${response.status}`);

            const data = await response.json();
            if (data.error) throw new Error(data.error + (data.traceback ? '\n' + data.traceback : ''));

            let html = '<div class="table-responsive"><table class="table table-striped table-hover table-dark">';
            html += '<thead><tr><th>Message</th><th>Label</th><th>Confidence</th><th>Action</th></tr></thead><tbody>';

            data.forEach(item => {
                const confPercent = (item.conf * 100).toFixed(2);
                const labelClass = item.label === 'scam' ? 'text-danger fw-bold' : 'text-success fw-bold';

                html += `<tr>
                    <td class="text-break">${item.msg.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</td>
                    <td class="${labelClass}">${item.label.toUpperCase()}</td>
                    <td>${confPercent}%</td>
                    <td><button class="btn btn-sm btn-outline-info" onclick="copyText('${item.msg.replace(/'/g, "\\'")}')"><i class="fas fa-copy"></i></button></td>
                </tr>`;
            });

            html += '</tbody></table></div>';

            resultsDiv.innerHTML = html;

            noteDiv.innerHTML = `Processed ${data.length} message${data.length !== 1 ? 's' : ''}. ` +
                               'Results automatically logged. ' +
                               '<button class="btn btn-sm btn-outline-success" onclick="exportToPDF()"><i class="fas fa-file-pdf me-1"></i> Export to PDF</button>';
        } catch (err) {
            resultsDiv.innerHTML = `<div class="alert alert-danger mt-4">Error: ${err.message}</div>`;
            console.error(err);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-play me-1"></i> Classify Now';
        }
    }

    function copyText(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert('Message copied to clipboard!');
        }).catch(() => alert('Copy failed'));
    }

    function exportToPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(16);
        doc.text('ScamShield Pro - Detection Results', 20, 20);
        doc.setFontSize(12);
        let y = 35;

        document.querySelectorAll('#results tbody tr').forEach(row => {
            const cells = row.querySelectorAll('td');
            if (cells.length) {
                const msgPreview = cells[0].textContent.substring(0, 60) + (cells[0].textContent.length > 60 ? '...' : '');
                doc.text(`${msgPreview} - ${cells[1].textContent} (${cells[2].textContent})`, 20, y);
                y += 10;
                if (y > 270) { doc.addPage(); y = 20; }
            }
        });

        doc.save('scamshield_results.pdf');
    }

    function updatePreview() {
        const input = document.getElementById('messages').value;
        const count = input.split('\n').filter(m => m.trim()).length;
        document.getElementById('preview').textContent = `Preview: ${count} message${count !== 1 ? 's' : ''} entered`;
    }

    function clearInput() {
        document.getElementById('messages').value = '';
        document.getElementById('results').innerHTML = '';
        document.getElementById('save-note').innerHTML = '';
        updatePreview();
    }
</script>

<style>
    /* Clean dark mode — matches common base.html dark Bootstrap themes */
    .card {
        background-color: #1e293b;
        border: 1px solid #334155;
    }
    .card-header {
        background-color: #0f172a;
        border-bottom: 1px solid #334155;
    }
    .form-control {
        background-color: #0f172a;
        border: 1px solid #475569;
        color: #e2e8f0;
    }
    .form-control:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
    }
    .table-dark {
        --bs-table-bg: #1e293b;
        --bs-table-color: #e2e8f0;
        --bs-table-border-color: #334155;
    }
    .table-hover tbody tr:hover {
        background-color: #334155;
    }
    .btn-primary {
        background-color: #3b82f6;
        border-color: #3b82f6;
    }
    .btn-primary:hover:not(:disabled) {
        background-color: #2563eb;
        border-color: #2563eb;
    }
    .text-danger { color: #ef4444 !important; }
    .text-success { color: #10b981 !important; }
    .bg-dark-subtle {
        background-color: #1e293b !important;
    }
</style>
{% endblock %}
